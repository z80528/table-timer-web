<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌台计时器</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
#tables { display: flex; flex-wrap: wrap; gap: 10px; }
.card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 120px; text-align: center; cursor: pointer; }
.card:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
button { margin-bottom: 10px; padding: 8px 12px; border:none; border-radius:5px; background:#007BFF; color:#fff; cursor:pointer; }
button:hover { background:#0056b3; }
</style>
</head>
<body>

<h2>桌台管理</h2>
<button onclick="addTable()">+新增桌台</button>
<div id="tables"></div>

<!-- 详情页 -->
<div id="detail" style="display:none;">
  <h3 id="detailName"></h3>
  <div id="timerDisplay">00:00:00</div>
  <button onclick="start()">开始</button>
  <button onclick="pause()">暂停</button>
  <button onclick="reset()">重置</button>
  <br><br>
  <label>备注: <input id="note" type="text"><button onclick="saveNote()">保存备注</button></label>
  <br><br>
  <div id="qrcode"></div>
  <button onclick="back()">返回主页</button>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import QRCode from "https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js";

// --- Firebase 配置 ---
const firebaseConfig = {
  apiKey: "AIzaSyCkdd-_Bc8dE4sOnM8PGpTk1YEKiNFkerc",
  authDomain: "table-timer-1.firebaseapp.com",
  databaseURL: "https://table-timer-1-default-rtdb.firebaseio.com",
  projectId: "table-timer-1",
  storageBucket: "table-timer-1.firebasestorage.app",
  messagingSenderId: "182367678402",
  appId: "1:182367678402:web:9e502cc9b3581c3b33305b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let tables = [];
let cur = null;
let timerInterval = null;
let timerStart = 0;
let pausedSec = 0;

// 获取桌台数据
onValue(ref(db, 'tables'), snapshot => {
  tables = snapshot.val() ? Object.values(snapshot.val()) : [];
  render();
});

// 主页渲染
function render() {
  const tablesDiv = document.getElementById('tables');
  const detailDiv = document.getElementById('detail');
  if(cur){
    detailDiv.style.display='block';
    tablesDiv.style.display='none';
    const table = tables.find(t=>t.id===cur);
    if(!table) return;
    document.getElementById('detailName').innerText = table.name;
    document.getElementById('note').value = table.note||'';
    updateTimerDisplay(table);
    generateQRCode(table);
    return;
  }
  detailDiv.style.display='none';
  tablesDiv.style.display='flex';
  tablesDiv.innerHTML = tables.map(t => `
    <div class="card" onclick="openDetail('${t.id}')">
      <div>${t.name}</div>
      <div>${formatTime(t.time || 0)}</div>
    </div>
  `).join('');
}

// 打开详情
function openDetail(id){ cur=id; render(); }

// 返回主页
function back(){ cur=null; clearInterval(timerInterval); render(); }

// 时间格式化
function formatTime(sec){
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor(sec%3600/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// 更新计时器显示
function updateTimerDisplay(table){
  clearInterval(timerInterval);
  let start = Date.now() - (table.time || 0)*1000;
  timerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now() - start)/1000);
    document.getElementById('timerDisplay').innerText = formatTime(elapsed);
  }, 500);
}

// 开始
function start(){
  const tableRef = ref(db, `tables/${cur}`);
  onValue(tableRef, snapshot=>{
    const table = snapshot.val();
    timerStart = Date.now() - (table.time||0)*1000;
    timerInterval = setInterval(()=>{
      const elapsed = Math.floor((Date.now() - timerStart)/1000);
      update(table.id, {time: elapsed});
      document.getElementById('timerDisplay').innerText = formatTime(elapsed);
    },500);
  });
}

// 暂停
function pause(){
  clearInterval(timerInterval);
  const tableRef = ref(db, `tables/${cur}`);
  onValue(tableRef, snapshot=>{
    const table = snapshot.val();
    update(tableRef, {time: Math.floor((Date.now()-timerStart)/1000)});
  });
}

// 重置
function reset(){
  clearInterval(timerInterval);
  update(ref(db, `tables/${cur}`), {time:0});
  document.getElementById('timerDisplay').innerText = '00:00:00';
}

// 新增桌台
function addTable(){
  const newId = 'table_' + (tables.length+1);
  const newTable = {id:newId, name:'桌台 '+(tables.length+1), time:0, note:''};
  set(ref(db, 'tables/'+newId), newTable);
}

// 保存备注
function saveNote(){
  const note = document.getElementById('note').value;
  update(ref(db, `tables/${cur}`), {note});
}

// 生成二维码
function generateQRCode(table){
  const qrcodeDiv = document.getElementById('qrcode');
  qrcodeDiv.innerHTML='';
  QRCode.toCanvas(qrcodeDiv, `${window.location.href}?table=${table.id}`, function (error) {
    if (error) console.error(error);
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</body>
</html>
