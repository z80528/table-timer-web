<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌台计时系统</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; padding:0;}
h1 { text-align:center; margin-top:20px;}
#tables { display:flex; flex-wrap:wrap; justify-content:center; padding:20px;}
.card { background:#fff; border:1px solid #ddd; border-radius:8px; width:200px; margin:10px; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.card h2 { margin:0 0 10px 0; font-size:18px; }
.card p { margin:5px 0; font-size:16px; }
button { margin:5px 2px; padding:6px 10px; font-size:14px; border:none; border-radius:5px; cursor:pointer; }
.start-btn{background:#4CAF50; color:#fff;}
.pause-btn{background:#FF9800; color:#fff;}
.reset-btn{background:#f44336; color:#fff;}
.custom-btn{background:#2196F3; color:#fff;}
#detail { max-width:500px; margin:20px auto; background:#fff; padding:20px; border-radius:8px; border:1px solid #ddd; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:none;}
#detail h2{ text-align:center; }
#customTime { width:60px; }
</style>
</head>
<body>

<h1>桌台计时系统</h1>
<div id="tables"></div>

<div id="detail">
  <h2 id="detailTitle">桌台详情</h2>
  <p>计时: <span id="timeDisplay">00:00:00</span></p>
  <button class="start-btn" onclick="startTimer()">开始</button>
  <button class="pause-btn" onclick="pauseTimer()">暂停</button>
  <button class="reset-btn" onclick="resetTimer()">重置</button>
  <input type="number" id="customTime" placeholder="秒">
  <button class="custom-btn" onclick="startCustomCountdown()">倒计时</button>
  <button onclick="backHome()">返回</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js"></script>
<script>
// ===== Firebase 配置 =====
const firebaseConfig = {
  apiKey: "你的API_KEY",
  authDomain: "你的项目.firebaseapp.com",
  databaseURL: "https://你的项目-default-rtdb.firebaseio.com",
  projectId: "你的项目ID",
  storageBucket: "你的项目.appspot.com",
  messagingSenderId: "消息ID",
  appId: "appID"
};
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== 数据和状态 =====
let tables = {}; // 本地缓存桌台数据
let currentTableId = null;
let timerInterval = null;

// ===== 初始化桌台 =====
function loadTables() {
  db.ref('tables').on('value', snapshot=>{
    tables = snapshot.val() || {};
    renderTables();
    if(currentTableId) renderDetail(currentTableId);
  });
}

function renderTables() {
  const container = document.getElementById('tables');
  container.innerHTML = '';
  Object.keys(tables).forEach(id=>{
    const t = tables[id];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${t.name}</h2>
                      <p>计时: ${formatTime(t.seconds || 0)}</p>
                      <button onclick="openDetail('${id}')">详情</button>`;
    container.appendChild(card);
  });
}

function openDetail(id){
  currentTableId = id;
  document.getElementById('tables').style.display='none';
  document.getElementById('detail').style.display='block';
  renderDetail(id);
}

function backHome(){
  currentTableId = null;
  document.getElementById('tables').style.display='flex';
  document.getElementById('detail').style.display='none';
  if(timerInterval) clearInterval(timerInterval);
}

// ===== 详情页 =====
function renderDetail(id){
  const t = tables[id];
  document.getElementById('detailTitle').innerText = t.name;
  document.getElementById('timeDisplay').innerText = formatTime(t.seconds || 0);
}

// ===== 计时功能 =====
function startTimer(){
  if(!currentTableId) return;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    const t = tables[currentTableId];
    const newSeconds = (t.seconds || 0) + 1;
    db.ref('tables/'+currentTableId+'/seconds').set(newSeconds);
  }, 1000);
}

function pauseTimer(){
  if(timerInterval) clearInterval(timerInterval);
}

function resetTimer(){
  if(!currentTableId) return;
  if(timerInterval) clearInterval(timerInterval);
  db.ref('tables/'+currentTableId+'/seconds').set(0);
}

function startCustomCountdown(){
  if(!currentTableId) return;
  let customSec = parseInt(document.getElementById('customTime').value);
  if(isNaN(customSec) || customSec <= 0) return alert('请输入有效秒数');
  if(timerInterval) clearInterval(timerInterval);
  db.ref('tables/'+currentTableId+'/seconds').set(customSec);
  timerInterval = setInterval(()=>{
    const t = tables[currentTableId];
    if(t.seconds <= 0){
      clearInterval(timerInterval);
      return;
    }
    db.ref('tables/'+currentTableId+'/seconds').set(t.seconds - 1);
  },1000);
}

// ===== 格式化时间 =====
function formatTime(sec){
  let h=Math.floor(sec/3600);
  let m=Math.floor((sec%3600)/60);
  let s=sec%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ===== 启动 =====
loadTables();
</script>
</body>
</html>
