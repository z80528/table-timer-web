<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

// ================== Firebase 配置 ==================
const firebaseConfig = {
  apiKey: "AIzaSyCkdd-_Bc8dE4sOnM8PGpTk1YEKiNFkerc",
  authDomain: "table-timer-1.firebaseapp.com",
  databaseURL: "https://table-timer-1-default-rtdb.firebaseio.com",
  projectId: "table-timer-1",
  storageBucket: "table-timer-1.firebasestorage.app",
  messagingSenderId: "182367678402",
  appId: "1:182367678402:web:9e502cc9b3581c3b33305b"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================== 全局变量 ==================
window.currentTableId = null;
let tables = [];
let nextId = 1;
const storeId = new URLSearchParams(window.location.search).get('storeId');
const tableIdParam = new URLSearchParams(window.location.search).get('tableId');
const isCustomerView = tableIdParam !== null;

// ================== 工具函数 ==================
function formatTime(sec){
  const h=String(Math.floor(sec/3600)).padStart(2,'0');
  const m=String(Math.floor(sec%3600/60)).padStart(2,'0');
  const s=String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function getCurrentSeconds(table){
  let total = table.totalTime||0;
  if(table.status==="使用中" && table.startTime){
    total += Math.floor((Date.now()-table.startTime)/1000);
  }
  return total;
}

// ================== 保存桌台 ==================
function saveTable(table){
  const tRef = ref(db,'tables/'+storeId+'/'+table.id);
  set(tRef,table);
}

// ================== 新增桌台 ==================
function addTable(){
  const id = Date.now().toString();
  const table = {
    id:id,
    displayNumber: nextId,
    name: '桌台 '+nextId,
    status:'未使用',
    totalTime:0,
    startTime:null,
    countdownEnd:null,
    remark:'',
    startRecords:[]
  };
  nextId++;
  saveTable(table);
}

// ================== 桌台操作 ==================
function startTable(id){
  const t = tables.find(x=>x.id==id);
  if(!t || t.status==='使用中') return;
  t.status='使用中';
  t.startTime=Date.now();
  t.startRecords.push({type:"start",time:t.startTime});
  saveTable(t);
}

function countdownStart(id){
  const input=prompt('请输入倒计时分钟数'); 
  if(!input) return; 
  const minutes=Number(input); 
  if(isNaN(minutes)||minutes<=0){alert('请输入正确分钟数');return;} 
  const t=tables.find(x=>x.id==id); 
  if(!t) return; 
  t.status='倒计时中'; 
  t.countdownEnd=Date.now()+minutes*60*1000; 
  saveTable(t);
}

function pauseTable(id){
  const t = tables.find(x=>x.id==id);
  if(!t) return;
  if(!confirm('确定暂停当前桌台计时吗？')) return;
  t.totalTime=getCurrentSeconds(t);
  t.startTime=null;
  t.countdownEnd=null;
  t.status='暂停中';
  t.startRecords.push({type:"pause",time:Date.now()});
  saveTable(t);
}

function resetTable(id){ 
  const t = tables.find(x=>x.id==id);
  if(!t) return;
  if(!confirm('重置后计时会清零，是否继续？')) return;
  t.totalTime=0;
  t.startTime=null;
  t.countdownEnd=null;
  t.status='未使用';
  t.startRecords=[];
  saveTable(t);
}

function deleteTable(id){ 
  if(!confirm('确定删除该桌台吗？')) return; 
  const tRef=ref(db,'tables/'+storeId+'/'+id); 
  set(tRef,null);
}

// ================== 优化版 renderUI ==================
function renderUI(){
  const el = document.getElementById('tables');

  // ---------- 顾客端 ----------
  if(isCustomerView){
    if(!window.customerListenerBound){
      window.customerListenerBound=true;
      const tRef = ref(db,'tables/'+storeId+'/'+tableIdParam);
      let customerTimer = null;
      let currentTable = null;

      onValue(tRef, snapshot=>{
        const t = snapshot.val();
        if(!t){
          el.innerHTML = '<p>桌台不存在</p>';
          return;
        }
        currentTable = t;

        if(!document.getElementById('customer-time')){
          el.innerHTML = `
            <h2 id="customer-name"></h2>
            <div class="time" id="customer-time">00:00:00</div>
            <div class="remark" id="customer-remark"></div>
          `;
        }

        document.getElementById('customer-name').innerText = t.name;
        document.getElementById('customer-remark').innerText = t.remark || '暂无备注';

        if(customerTimer) clearInterval(customerTimer);

        customerTimer = setInterval(()=>{
          if(!currentTable) return;
          let seconds = currentTable.totalTime || 0;
          if(currentTable.status === "使用中" && currentTable.startTime){
            seconds += Math.floor((Date.now() - currentTable.startTime)/1000);
          } else if(currentTable.status === "倒计时中" && currentTable.countdownEnd){
            seconds = Math.max(0, Math.floor((currentTable.countdownEnd - Date.now())/1000));
          }
          document.getElementById('customer-time').innerText = formatTime(seconds);
        },1000);
      });
    }
    return;
  }

  // ---------- 管理端列表 ----------
  const active = document.activeElement;
  const isEditing = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA');

  if(!currentTableId){
    if(!document.querySelector('.tables')){
      el.innerHTML = '';
      const topDiv = document.createElement('div');
      topDiv.className='top';
      topDiv.innerHTML='<h1>桌台计时系统</h1><button class="add-btn">+ 新增桌台</button>';
      topDiv.querySelector('button').onclick=addTable;
      el.appendChild(topDiv);

      const listDiv = document.createElement('div');
      listDiv.className='tables';
      tables.forEach(t=>{
        const card = document.createElement('div');
        card.className='card';
        card.id='table-'+t.id;
        card.innerHTML=`
          <h2>${t.name}</h2>
          <div class="status ${t.status==='使用中'?'running':t.status==='暂停中'?'pause':t.status==='倒计时中'?'countdown':'unused'}">${t.status}</div>
          <div class="time" id="time-${t.id}">${formatTime(getCurrentSeconds(t))}</div>
        `;
        card.onclick=()=>{ currentTableId=t.id; renderUI(); };
        listDiv.appendChild(card);
      });
      el.appendChild(listDiv);
    } else if(!isEditing){
      tables.forEach(t=>{
        const card = document.getElementById('table-'+t.id);
        if(!card) return;
        const timeDiv = card.querySelector('.time');
        const statusDiv = card.querySelector('.status');
        if(timeDiv) timeDiv.innerText = t.status==='倒计时中' && t.countdownEnd ? 
          formatTime(Math.max(0,Math.floor((t.countdownEnd-Date.now())/1000))) :
          formatTime(getCurrentSeconds(t));
        if(statusDiv){
          statusDiv.innerText = t.status;
          statusDiv.className='status '+(t.status==='使用中'?'running':t.status==='暂停中'?'pause':t.status==='倒计时中'?'countdown':'unused');
        }
      });
    }
    return;
  }

  // ---------- 管理端详情 ----------
  const t = tables.find(x=>x.id===currentTableId);
  if(!t) return;

  el.innerHTML=`<div class="card" style="max-width:500px;margin:40px auto;">
    <button class="back-btn" onclick="currentTableId=null;renderUI()">← 返回</button>
    <input id="detail-name" value="${t.name}" style="border:none;font-size:32px;font-weight:bold;text-align:center;margin-bottom:20px;outline:none;background:none;"/>
    <div class="status ${t.status==='使用中'?'running':t.status==='暂停中'?'pause':t.status==='倒计时中'?'countdown':'unused'}" style="display:block;width:fit-content;margin:20px auto;" id="detail-status">${t.status}</div>
    <div class="time" id="detail-time">${t.status==='倒计时中'?formatTime(Math.max(0,Math.floor((t.countdownEnd-Date.now())/1000))):formatTime(getCurrentSeconds(t))}</div>
    <textarea id="detail-remark" placeholder="请输入备注...">${t.remark||''}</textarea>
    <div class="btns">
      <button class="save-btn" onclick="t.name=document.getElementById('detail-name').value;t.remark=document.getElementById('detail-remark').value;saveTable(t);alert('已保存修改，顾客端扫码即可看到更新内容');">💾 保存修改</button>
      <button class="start" onclick="startTable('${t.id}')">开始</button>
      <button class="countdown-btn" onclick="countdownStart('${t.id}')">倒计时开始</button>
      <button class="pause-btn" onclick="pauseTable('${t.id}')">暂停</button>
      <button class="reset" onclick="resetTable('${t.id}')">重置</button>
      <button class="delete" onclick="deleteTable('${t.id}')">删除</button>
    </div>
    <div id="start-records">
      <h3>开始/暂停记录：</h3>
      <ul>
        ${t.startRecords && t.startRecords.length>0 ? t.startRecords.map(r=>`<li>${r.type==='start'?'开始':'暂停'}: ${new Date(r.time).toLocaleString()}</li>`).join('') : '<li>暂无记录</li>'}
      </ul>
    </div>
    <div id="qrcode" style="text-align:center;"></div>
  </div>`;

  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML='';
  new QRCode(qrDiv,{
    text: window.location.origin+window.location.pathname+'?storeId='+storeId+'&tableId='+t.id,
    width:120,
    height:120
  });
}

// ================== Firebase 监听 ==================
function loadTables(){
  if(!storeId){ alert('请带 storeId 参数访问网页'); return; }
  const tRef = ref(db,'tables/'+storeId);
  onValue(tRef,snapshot=>{
    const val = snapshot.val();
    tables = val ? Object.values(val) : [];
    if(tables.length>0){
      const ids = tables.map(t=>parseInt(t.displayNumber||t.id));
      nextId = Math.max(...ids)+1;
    } else nextId = 1;
    renderUI();
  });
}

// ================== 优化定时器 ==================
setInterval(()=>{
  tables.forEach(t=>{
    if(t.status==='倒计时中' && t.countdownEnd && Date.now()>=t.countdownEnd){
      t.status='使用中';
      t.startTime = t.startTime || Date.now();
      t.countdownEnd = null;
      saveTable(t);
    }
  });
  renderUI(); // 每秒只更新计时数字和状态，不重建 DOM
},1000);

// ================== 暴露操作函数 ==================
window.addTable=addTable;
window.startTable=startTable;
window.countdownStart=countdownStart;
window.pauseTable=pauseTable;
window.resetTable=resetTable;
window.deleteTable=deleteTable;

// ================== 初始化 ==================
loadTables();
</script>
