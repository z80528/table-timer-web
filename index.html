<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌台计时系统</title>
<style>
body{margin:0;padding:20px;font-family:Arial;background:#f5f5f5;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
button{border:none;padding:12px 16px;border-radius:12px;cursor:pointer;color:white;}
.add-btn{background:black;}
.tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.card{background:white;border-radius:20px;padding:20px;}
.status{padding:5px 12px;border-radius:20px;color:white;font-size:12px;}
.unused{background:#999;} .running{background:green;} .pause{background:orange;} .countdown{background:#9c27b0;}
.time{font-size:42px;text-align:center;margin:30px 0;font-weight:bold;}
textarea,input{width:100%;box-sizing:border-box;}
</style>
</head>
<body>
<div id="tables"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "你的key",
  authDomain: "xxx.firebaseapp.com",
  databaseURL: "你的数据库URL",
  projectId: "xxx",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let tables=[], nextId=1;
const storeId = new URLSearchParams(location.search).get('storeId');
const tableIdParam = new URLSearchParams(location.search).get('tableId');
const isCustomer = tableIdParam!=null;

function formatTime(s){
  const h=String(Math.floor(s/3600)).padStart(2,'0');
  const m=String(Math.floor(s%3600/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  return `${h}:${m}:${ss}`;
}

function getSec(t){
  let s=t.totalTime||0;
  if(t.status==="使用中" && t.startTime){
    s+=Math.floor((Date.now()-t.startTime)/1000);
  }
  return s;
}

function save(t){ set(ref(db,'tables/'+storeId+'/'+t.id),t); }

function load(){
  onValue(ref(db,'tables/'+storeId),snap=>{
    tables=snap.val()?Object.values(snap.val()):[];
    nextId=tables.length?Math.max(...tables.map(x=>x.displayNumber||1))+1:1;
    render();
  });
}

function add(){
  save({
    id:Date.now().toString(),
    displayNumber:nextId,
    name:'桌台 '+nextId,
    status:'未使用',
    totalTime:0,
    remark:'',
    startRecords:[]
  });
}

function start(id){
  let t=tables.find(x=>x.id==id);
  t.status='使用中'; t.startTime=Date.now();
  t.startRecords.push({type:'start',time:Date.now()});
  save(t);
}

function pause(id){
  let t=tables.find(x=>x.id==id);
  t.totalTime=getSec(t);
  t.status='暂停中';
  t.startTime=null;
  t.startRecords.push({type:'pause',time:Date.now()});
  save(t);
}

function reset(id){
  let t=tables.find(x=>x.id==id);
  t.totalTime=0; t.status='未使用'; t.startRecords=[];
  save(t);
}

function render(){
  const el=document.getElementById('tables');

  // 顾客端（🔥实时计时）
  if(isCustomer){
    const tRef=ref(db,'tables/'+storeId+'/'+tableIdParam);
    let timer=null, current=null;

    onValue(tRef,snap=>{
      const t=snap.val();
      if(!t){el.innerHTML='桌台不存在';return;}

      current=t;

      if(!document.getElementById('ct')){
        el.innerHTML=`<h2 id="cn"></h2>
        <div class="time" id="ct"></div>
        <div id="cr"></div>`;
      }

      document.getElementById('cn').innerText=t.name;
      document.getElementById('cr').innerText=t.remark||'';

      if(timer) clearInterval(timer);

      timer=setInterval(()=>{
        let s=current.totalTime||0;
        if(current.status==="使用中"&&current.startTime){
          s+=Math.floor((Date.now()-current.startTime)/1000);
        }
        document.getElementById('ct').innerText=formatTime(s);
      },1000);
    });

    return;
  }

  // 管理端列表
  if(!window.cur){
    el.innerHTML=`<button onclick="add()">+新增</button>`+
    tables.map(t=>`<div onclick="cur='${t.id}';render()">
      ${t.name}<br>${formatTime(getSec(t))}
    </div>`).join('');
    return;
  }

  // 详情页
  const t=tables.find(x=>x.id==cur);

  el.innerHTML=`
  <button onclick="cur=null;render()">返回</button>
  <input id="n" value="${t.name}">
  <div class="time">${formatTime(getSec(t))}</div>
  <textarea id="r">${t.remark||''}</textarea>
  <button onclick="saveDetail()">保存</button>
  <button onclick="start('${t.id}')">开始</button>
  <button onclick="pause('${t.id}')">暂停</button>
  <button onclick="reset('${t.id}')">重置</button>
  <div id="qrcode"></div>
  <ul>
    ${t.startRecords.map(r=>`<li>${r.type} ${new Date(r.time).toLocaleString()}</li>`).join('')}
  </ul>
  `;

  // ✅ 修复二维码（关键）
  const base=location.origin+location.pathname;
  new QRCode(document.getElementById("qrcode"),{
    text:`${base}?storeId=${storeId}&tableId=${t.id}`,
    width:120,height:120
  });

  window.saveDetail=()=>{
    t.name=document.getElementById('n').value;
    t.remark=document.getElementById('r').value;
    save(t);
  };
}

window.add=add;
window.start=start;
window.pause=pause;
window.reset=reset;

load();
</script>
</body>
</html>
