<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌台计时系统</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    h1 { font-size: 24px; }
    .table-info { margin-bottom: 10px; }
    .timer { font-size: 48px; margin: 10px 0; }
    input, textarea { width: 100%; padding: 5px; margin: 5px 0; font-size: 16px; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkdd-_Bc8dE4sOnM8PGpTk1YEKiNFkerc",
      authDomain: "table-timer-1.firebaseapp.com",
      databaseURL: "https://table-timer-1-default-rtdb.firebaseio.com",
      projectId: "table-timer-1",
      storageBucket: "table-timer-1.firebasestorage.app",
      messagingSenderId: "182367678402",
      appId: "1:182367678402:web:9e502cc9b3581c3b33305b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const tableId = new URLSearchParams(window.location.search).get('table') || 'defaultTable';

    const tableNameInput = document.getElementById('tableName');
    const noteInput = document.getElementById('note');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const resetBtn = document.getElementById('reset');

    let intervalId = null;

    function formatTime(ms) {
      let totalSeconds = Math.floor(ms / 1000);
      let h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      let m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      let s = String(totalSeconds % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function loadTable() {
      const tableRef = ref(db, `tables/${tableId}`);
      onValue(tableRef, (snapshot) => {
        const data = snapshot.val() || {};
        tableNameInput.value = data.name || tableId;
        noteInput.value = data.note || '';
        if (data.startTime && !data.paused) {
          startTimer(data.startTime);
        } else {
          stopTimer();
          timerDisplay.textContent = formatTime(data.elapsed || 0);
        }
      });
    }

    function saveTable() {
      update(ref(db, `tables/${tableId}`), {
        name: tableNameInput.value,
        note: noteInput.value
      });
    }

    tableNameInput.addEventListener('blur', saveTable);
    noteInput.addEventListener('blur', saveTable);

    function startTimer(startTime) {
      stopTimer();
      const tableRef = ref(db, `tables/${tableId}`);
      const now = Date.now();
      if (!startTime) {
        startTime = now;
        update(tableRef, { startTime, paused: false });
      } else {
        update(tableRef, { paused: false });
      }
      intervalId = setInterval(() => {
        get(tableRef).then(snap => {
          const data = snap.val() || {};
          const elapsed = data.paused ? data.elapsed : (Date.now() - data.startTime + (data.elapsed || 0));
          timerDisplay.textContent = formatTime(elapsed);
        });
      }, 1000);
    }

    function stopTimer() {
      if (intervalId) clearInterval(intervalId);
      get(ref(db, `tables/${tableId}`)).then(snap => {
        const data = snap.val() || {};
        if (data.startTime && !data.paused) {
          const elapsed = Date.now() - data.startTime + (data.elapsed || 0);
          update(ref(db, `tables/${tableId}`), { elapsed, paused: true, startTime: null });
        }
      });
    }

    startBtn.addEventListener('click', () => startTimer());
    pauseBtn.addEventListener('click', stopTimer);
    resetBtn.addEventListener('click', () => {
      stopTimer();
      update(ref(db, `tables/${tableId}`), { elapsed: 0, startTime: null });
      timerDisplay.textContent = formatTime(0);
    });

    loadTable();
  </script>
</head>
<body>
  <h1>桌台计时系统</h1>
  <div class="table-info">
    <label>桌台名称：</label>
    <input id="tableName" placeholder="输入桌台名称">
  </div>
  <div class="table-info">
    <label>备注：</label>
    <textarea id="note" placeholder="输入备注"></textarea>
  </div>
  <div class="timer" id="timer">00:00:00</div>
  <div>
    <button id="start">开始</button>
    <button id="pause">暂停</button>
    <button id="reset">重置</button>
  </div>
</body>
</html>
