<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>桌台计时系统</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; }
    .card { border: 1px solid #ccc; padding: 20px; margin: 20px auto; max-width: 500px; border-radius: 8px; }
    .btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; }
    .add-btn { background-color: orange; color: #fff; }
    .back-btn { background-color: #666; color: #fff; }
    .start { background-color: green; color: #fff; }
    .pause { background-color: red; color: #fff; }
    input { width: 100%; padding: 8px; margin: 5px 0; }
    textarea { width: 100%; padding: 8px; margin: 5px 0; }
  </style>
</head>
<body>

<h1>桌台计时系统</h1>
<div id="tablesList"></div>
<div id="tableDetail"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  let tables = JSON.parse(localStorage.getItem('tables')) || [];
  let currentTableId = new URLSearchParams(window.location.search).get('tableId');

  function saveTables() {
    localStorage.setItem('tables', JSON.stringify(tables));
  }

  function renderTables() {
    const el = document.getElementById('tablesList');
    el.innerHTML = '';
    tables.forEach(t => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${t.name}</h3>
        <button class="add-btn" onclick="viewTable('${t.id}')">查看桌台</button>
      `;
      el.appendChild(div);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '新建桌台';
    addBtn.onclick = addTable;
    el.appendChild(addBtn);
  }

  function addTable() {
    const name = prompt('请输入桌台名称');
    if (!name) return;
    const id = Date.now().toString();
    const table = { id, name, remark: '', startTime: null, elapsed: 0 };
    tables.push(table);
    saveTables();
    renderTables();
  }

  function viewTable(id) {
    const table = tables.find(t => t.id === id);
    if (!table) { alert('桌台不存在'); return; }
    currentTableId = id;
    renderDetail(table);
  }

  function renderDetail(table) {
    const el = document.getElementById('tableDetail');
    el.innerHTML = `
      <div class="card">
        <h2>${table.name}</h2>
        <p>备注：<textarea id="remark">${table.remark}</textarea></p>
        <p>计时：<span id="timer">${table.elapsed}</span> 秒</p>
        <button class="start" onclick="startTimer()">开始</button>
        <button class="pause" onclick="pauseTimer()">暂停</button>
        <button class="back-btn" onclick="backHome()">返回</button>
        <p>桌台二维码：</p>
        <div id="qrcode"></div>
      </div>
    `;
    QRCode.toCanvas(document.getElementById('qrcode'), `${window.location.origin}${window.location.pathname}?tableId=${table.id}`, function (error) {
      if (error) console.error(error);
    });
  }

  let timerInterval = null;
  function startTimer() {
    const table = tables.find(t => t.id === currentTableId);
    if (!table) return;
    if (timerInterval) return; // 已经在计时
    table.startTime = Date.now() - table.elapsed * 1000;
    timerInterval = setInterval(() => {
      table.elapsed = Math.floor((Date.now() - table.startTime) / 1000);
      document.getElementById('timer').textContent = table.elapsed;
      saveTables();
    }, 1000);
  }

  function pauseTimer() {
    const table = tables.find(t => t.id === currentTableId);
    if (!table) return;
    clearInterval(timerInterval);
    timerInterval = null;
    table.elapsed = Math.floor((Date.now() - table.startTime) / 1000);
    table.startTime = null;
    saveTables();
  }

  function backHome() {
    currentTableId = null;
    document.getElementById('tableDetail').innerHTML = '';
    renderTables();
  }

  // 页面加载时
  if (currentTableId) {
    const table = tables.find(t => t.id === currentTableId);
    if (table) renderDetail(table);
    else alert('桌台不存在');
  } else {
    renderTables();
  }

  // 保存备注
  document.addEventListener('input', (e) => {
    if (!currentTableId) return;
    const table = tables.find(t => t.id === currentTableId);
    if (!table) return;
    if (e.target.id === 'remark') table.remark = e.target.value;
    saveTables();
  });
</script>
</body>
</html>
